<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>视频去水印工具 - AI智能改写</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #e8f0ff 0%, #f5f0ff 50%, #fff5f8 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #a855f7 100%);
            border-radius: 30px;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        header h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1rem;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }

        .content {
            background: white;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .section-title {
            color: #1f2937;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea 0%, #a855f7 100%);
            border-radius: 2px;
        }

        .platform-section {
            margin-bottom: 40px;
        }

        .platform-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .platform-btn {
            flex: 1;
            max-width: 250px;
            padding: 20px 30px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            background: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .platform-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .platform-btn.active {
            background: #667eea;
            border-color: #667eea;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
        }

        .platform-btn.active .platform-name {
            color: white;
        }

        .platform-icon {
            font-size: 3rem;
        }

        .platform-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1f2937;
            transition: color 0.3s ease;
        }

        .link-section {
            margin-bottom: 40px;
        }

        .link-input-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .link-input {
            flex: 1;
            padding: 16px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
            background: #f9fafb;
        }

        .link-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .paste-btn {
            padding: 16px 24px;
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .paste-btn:hover {
            background: #667eea;
            border-color: #667eea;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .link-hint {
            color: #666;
            font-size: 0.95rem;
            padding-left: 5px;
        }

        .action-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .process-btn {
            padding: 16px 60px;
            background: linear-gradient(135deg, #667eea 0%, #a855f7 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.3);
        }

        .process-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .result-section {
            display: none;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px dashed #e0e0e0;
        }

        .result-card {
            background: linear-gradient(135deg, #f0f9ff 0%, #faf5ff 100%);
            border-radius: 16px;
            padding: 28px;
            border: 2px solid #e5e7eb;
            margin-bottom: 25px;
        }

        .video-preview {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        .result-info {
            margin-bottom: 25px;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            padding: 10px 0;
            font-size: 1rem;
        }

        .info-label {
            color: #6b7280;
            font-weight: 500;
            min-width: 70px;
            flex-shrink: 0;
        }

        .info-value {
            color: #1f2937;
            font-weight: 600;
            flex: 1;
            word-break: break-all;
        }

        .download-btn {
            width: 100%;
            padding: 16px 30px;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        }

        .ai-rewrite-section {
            margin: 25px 0;
            padding: 25px;
            background: linear-gradient(135deg, #fff5f8 0%, #f0f9ff 100%);
            border-radius: 16px;
            border: 2px solid #e5e7eb;
        }

        .ai-section-title {
            color: #1f2937;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .ai-content-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .ai-content-box {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e5e7eb;
        }

        .ai-box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .ai-box-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1f2937;
        }

        .ai-generate-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #a855f7 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ai-generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .ai-text-area {
            position: relative;
            min-height: 150px;
        }

        .ai-loading {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            z-index: 10;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .ai-result-text {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            line-height: 1.7;
            resize: vertical;
            background: #f9fafb;
            color: #1f2937;
        }

        .ai-result-text:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .ai-box-actions {
            display: none;
            gap: 10px;
            margin-top: 12px;
        }

        .ai-refresh-btn,
        .ai-copy-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ai-refresh-btn {
            background: white;
            border: 2px solid #e5e7eb;
            color: #1f2937;
        }

        .ai-refresh-btn:hover {
            background: #f3f4f6;
            border-color: #667eea;
            color: #667eea;
        }

        .ai-copy-btn {
            background: linear-gradient(135deg, #667eea 0%, #a855f7 100%);
            color: white;
        }

        .ai-copy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }

            header h1 {
                font-size: 2rem;
            }

            .content {
                padding: 25px 20px;
            }

            .platform-buttons {
                flex-direction: column;
            }

            .platform-btn {
                max-width: 100%;
            }

            .link-input-wrapper {
                flex-direction: column;
            }

            .paste-btn {
                width: 100%;
            }

            .process-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎥 视频去水印工具</h1>
            <p class="subtitle">支持抖音、小红书 | AI智能改写</p>
        </header>

        <div class="content">
            <div class="platform-section">
                <div class="section-title">选择平台</div>
                <div class="platform-buttons">
                    <button class="platform-btn" onclick="selectPlatform('douyin')">
                        <div class="platform-icon">📱</div>
                        <div class="platform-name">抖音</div>
                    </button>
                    <button class="platform-btn" onclick="selectPlatform('xiaohongshu')">
                        <div class="platform-icon">📕</div>
                        <div class="platform-name">小红书</div>
                    </button>
                </div>
            </div>

            <div class="link-section">
                <div class="section-title">视频链接</div>
                <div class="link-input-wrapper">
                    <input type="text" id="videoLink" class="link-input" placeholder="请粘贴视频分享链接...">
                    <button class="paste-btn" onclick="pasteLink()">📋</button>
                </div>
                <div class="link-hint">💡 支持直接粘贴分享文本，自动提取链接</div>
            </div>

            <div class="action-section">
                <button class="process-btn" onclick="processVideo()">✨ 开始去水印</button>
            </div>

            <div class="result-section" id="resultSection">
                <div class="result-card">
                    <div class="section-title">处理结果</div>
                    <div class="video-preview" id="videoPreview" style="display: none;">
                        <img id="videoCover" src="" alt="视频封面">
                    </div>
                    <div class="result-info">
                        <div class="info-item">
                            <span class="info-label">平台：</span>
                            <span class="info-value" id="resultPlatform">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">标题：</span>
                            <span class="info-value" id="videoTitle">-</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">状态：</span>
                            <span class="info-value" style="color: #10b981;">✅ 处理成功</span>
                        </div>
                    </div>
                    <button class="download-btn" onclick="downloadVideo()">⬇️ 下载无水印视频</button>
                </div>

                <div class="ai-rewrite-section">
                    <div class="ai-section-title">🤖 AI智能改写</div>
                    
                    <div class="ai-content-grid">
                        <div class="ai-content-box">
                            <div class="ai-box-header">
                                <div class="ai-box-title">📝 改写标题</div>
                                <button class="ai-generate-btn" onclick="generateAIContent('title')">✨ 生成</button>
                            </div>
                            <div class="ai-text-area">
                                <div class="ai-loading" id="titleLoading">
                                    <div class="loading-spinner"></div>
                                    <p>AI正在生成标题...</p>
                                </div>
                                <textarea class="ai-result-text" id="titleResult" placeholder="点击"生成"按钮，AI将为您改写标题"></textarea>
                            </div>
                            <div class="ai-box-actions" id="titleActions">
                                <button class="ai-refresh-btn" onclick="generateAIContent('title')">🔄 换一换</button>
                                <button class="ai-copy-btn" onclick="copyContent('title')">📋 复制</button>
                            </div>
                        </div>

                        <div class="ai-content-box">
                            <div class="ai-box-header">
                                <div class="ai-box-title">📄 改写正文</div>
                                <button class="ai-generate-btn" onclick="generateAIContent('copywriting')">✨ 生成</button>
                            </div>
                            <div class="ai-text-area">
                                <div class="ai-loading" id="copywritingLoading">
                                    <div class="loading-spinner"></div>
                                    <p>AI正在生成文案...</p>
                                </div>
                                <textarea class="ai-result-text" id="copywritingResult" placeholder="点击"生成"按钮，AI将为您改写推广文案"></textarea>
                            </div>
                            <div class="ai-box-actions" id="copywritingActions">
                                <button class="ai-refresh-btn" onclick="generateAIContent('copywriting')">🔄 换一换</button>
                                <button class="ai-copy-btn" onclick="copyContent('copywriting')">📋 复制</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedPlatform = null;
        let videoData = null;

        const API_CONFIG = {
            url: 'https://api.wxshares.com/api/qsy/as',
            key: 'puM4bNPd7nBIFcRXBUgvfutGzE'
        };

        const AI_API_CONFIG = {
            url: 'http://43.139.203.146:8050/v1/chat/completions',
            apiKey: 'sk-xjlzds0424',
            model: 'deepseek-chat'
        };

        function selectPlatform(platform) {
            selectedPlatform = platform;
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.platform-btn').classList.add('active');
            
            const platformName = platform === 'douyin' ? '抖音' : '小红书';
            alert('已选择 ' + platformName + ' 平台');
        }

        async function pasteLink() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('videoLink').value = text;
                alert('链接已粘贴');
            } catch (err) {
                alert('请手动粘贴链接（Ctrl+V）');
                document.getElementById('videoLink').focus();
            }
        }

        async function processVideo() {
            let videoLink = document.getElementById('videoLink').value.trim();
            
            if (!selectedPlatform) {
                alert('⚠️ 请先选择平台');
                return;
            }
            
            if (!videoLink) {
                alert('⚠️ 请输入视频链接');
                return;
            }
            
            const urlMatch = videoLink.match(/(https?:\/\/[^\s]+)/);
            if (urlMatch) {
                videoLink = urlMatch[0];
                document.getElementById('videoLink').value = videoLink;
            } else {
                alert('⚠️ 未找到有效的链接地址');
                return;
            }
            
            alert('🔄 正在解析视频...');
            
            try {
                const formData = new URLSearchParams();
                formData.append('key', API_CONFIG.key);
                formData.append('url', videoLink);
                
                const response = await fetch(API_CONFIG.url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded;charset=utf-8'
                    },
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    videoData = result.data;
                    
                    const platformName = selectedPlatform === 'douyin' ? '抖音' : '小红书';
                    document.getElementById('resultPlatform').textContent = platformName;
                    document.getElementById('videoTitle').textContent = result.data.title || '无标题';
                    
                    if (result.data.photo) {
                        document.getElementById('videoCover').src = result.data.photo;
                        document.getElementById('videoPreview').style.display = 'block';
                    }
                    
                    document.getElementById('resultSection').style.display = 'block';
                    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    
                    alert('✨ 视频解析成功！');
                } else {
                    alert('❌ 解析失败：' + result.msg);
                }
                
            } catch (error) {
                console.error('API调用错误：', error);
                alert('❌ 网络错误，请稍后重试');
            }
        }

        function downloadVideo() {
            if (!videoData || !videoData.url) {
                alert('❌ 视频地址不存在');
                return;
            }
            
            const link = document.createElement('a');
            link.href = videoData.url;
            link.download = (videoData.title || '视频') + '.mp4';
            link.target = '_blank';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            alert('✅ 下载已开始！');
        }

        async function generateAIContent(type) {
            if (!videoData || !videoData.title) {
                alert('⚠️ 请先解析视频');
                return;
            }
            
            const resultText = document.getElementById(type + 'Result');
            const loading = document.getElementById(type + 'Loading');
            const actions = document.getElementById(type + 'Actions');
            
            loading.style.display = 'flex';
            resultText.value = '';
            actions.style.display = 'none';
            
            try {
                let content = '';
                
                if (type === 'title') {
                    content = await generateAITitle();
                } else if (type === 'copywriting') {
                    content = await generateAICopywriting();
                }
                
                loading.style.display = 'none';
                resultText.value = content;
                actions.style.display = 'flex';
                
                alert('✨ 内容已生成！');
            } catch (error) {
                loading.style.display = 'none';
                resultText.value = '生成失败，请重试';
                actions.style.display = 'flex';
                alert('❌ 生成失败，请重试');
            }
        }

        async function generateAITitle() {
            const videoTitle = videoData.title;
            const platform = selectedPlatform === 'douyin' ? '抖音' : '小红书';
            
            const prompt = `请为以下${platform}视频标题进行优化改写：

原标题：${videoTitle}

要求：
1. 标题要更吸引眼球，提升点击率
2. 可以添加1-2个表情符号
3. 保持原意，但表达更生动
4. 字数控制在30字以内
5. 适合${platform}平台的风格

请直接输出3个不同风格的标题，每行一个，不要编号。`;

            return await callAI(prompt);
        }

        async function generateAICopywriting() {
            const videoTitle = videoData.title;
            const platform = selectedPlatform === 'douyin' ? '抖音' : '小红书';
            
            const prompt = `请为以下${platform}视频生成一段吸引人的推广文案：

视频标题：${videoTitle}

要求：
1. 文案要有吸引力，能引起用户兴趣
2. 包含2-3个相关的表情符号
3. 添加3-5个热门话题标签（#开头）
4. 字数控制在100字以内
5. 语气要轻松活泼，适合社交媒体

请直接输出文案内容，不要有其他说明。`;

            return await callAI(prompt);
        }

        async function callAI(prompt) {
            try {
                const response = await fetch(AI_API_CONFIG.url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + AI_API_CONFIG.apiKey
                    },
                    body: JSON.stringify({
                        model: AI_API_CONFIG.model,
                        messages: [
                            {
                                role: 'user',
                                content: prompt
                            }
                        ]
                    })
                });
                
                const result = await response.json();
                
                if (result.choices && result.choices[0]) {
                    return result.choices[0].message.content;
                } else {
                    throw new Error('AI返回格式错误');
                }
            } catch (error) {
                console.error('AI API调用错误：', error);
                throw error;
            }
        }

        function copyContent(type) {
            const textarea = document.getElementById(type + 'Result');
            if (!textarea.value) {
                alert('⚠️ 没有内容可复制');
                return;
            }
            
            textarea.select();
            document.execCommand('copy');
            
            const typeName = type === 'title' ? '标题' : '正文';
            alert('✅ ' + typeName + '已复制到剪贴板');
        }

        document.getElementById('videoLink').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                processVideo();
            }
        });
    </script>
</body>
</html>
